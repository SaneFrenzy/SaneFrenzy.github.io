<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.bootcss.com/jquery/3.4.1/jquery.min.js"></script>
    <link rel="stylesheet" href="ol/ol.css">
    <script src="ol/dist/ol.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
    <style>
        body {
            font-family: arial, sans-serif;
            margin:0;
        }

        .checkcaption {
            text-align: center;
            margin-top: 10px;
        }

        .check {
            width: 60px;
            height: 30px;
            border: #222 solid 2px;
            position: relative;
            margin: 10px auto;
            border-radius: 15px;
        }

        .check input {
            visibility: hidden;
            height: 30px;
            width: 60px;
        }

        .check label {
            display: block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #e74c3c;
            cursor: pointer;
            position: absolute;
            top: 18%;
            left: 12%;
            transition: all 0.3s ease;
        }

        .check input:checked + label {
            left: 55%;
            background-color: #7b3;
        }

        div#timeline {
            background-color: #5ca8db;
            margin-bottom: 150px;
            height: 10px;
            width: 100%;
            position: fixed;
            z-index: 999;
            bottom: 0;
        }

        div#timeline .inside {
            position: absolute;
            height: 4px;
            background-color: #fff;
            width: 0%;
            top: 3px;
            left: 0;
        }

        div#timeline .dot {
            z-index: 99;
            transition: 0.3s ease-in-out;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: -15px;
            text-align: center;
        }

        div#timeline .dot:nth-child(1) {
            left: 20%;
            background-color: #2c3e50;
        }

        div#timeline .dot:nth-child(2) {
            left: 40%;
            background-color: #e74c3c;
        }

        div#timeline .dot:nth-child(3) {
            left: 60%;
            background-color: #7b3;
        }

        div#timeline .dot:nth-child(4) {
            left: 80%;
            background-color: #e8c309;
        }

        div#timeline .dot:hover {
            transform: scale(1.2);
        }

        div#timeline .dot date {
            font-family: roboto;
            font-size: 1.1rem;
            display: block;
            position: relative;
            top: -60px;
            text-align: center;
        }

        div#timeline .dot span {
            display: inline-block;
            margin-top: 10px;
            width: 20px;
            height: 20px;
            background-color: #fff;
            position: relative;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        article {
            display: none;
            position: relative;
            top: 30px;
            max-width: 960px;
            background-color: #fff;
            padding: 20px;
            margin: auto;
        }

        article date {
            display: block;
            text-align: right;
        }

        article h2 {
            font-family: merriweather, sans-serif;
            font-size: 5rem;
            padding: 10px 0;
            border-bottom: solid #111 2px;
            margin-bottom: 20px;
        }

        article p {
            line-height: 130%;
        }

        div.mask {
            display: none;
            left: 0;
            top: 0;
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 99999;
        }

        div.mask.active {
            display: block;
        }

        div.mask article {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            margin-top: 50px;
            max-width: 960px;
            background-color: #fff;
            padding: 20px;
            margin: auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
        }

        div.mask article date {
            display: block;
            text-align: right;
        }

        div.mask article h2 {
            font-family: merriweather, sans-serif;
            font-size: 5rem;
            padding: 10px 0;
            border-bottom: solid #111 2px;
            margin-bottom: 20px;
        }

        div.mask article p {
            line-height: 130%;
        }

        .popUp{
            display:block;
            background: rgba(226, 226, 226);
            color:black;
            border:solid 1px;
            padding:5px;
        }
    </style>
</head>
<body>
<!--<p class="checkcaption">no modal boxes?</p>-->
<!--<div class="check">-->
<!--    <input type="checkbox" id="switch1" name="switch1" class="switch" />-->

<!--</div>-->
<div id="map"></div>
<div id="timeline">
    <div class="dot" id="one">
        <span></span>
        <date>2014</date>
    </div>
    <div class="dot" id="two">
        <span></span>
        <date>2015</date>
    </div>
    <div class="dot" id="three">
        <span></span>
        <date>2017</date>
    </div>
    <div class="dot" id="four">
        <span></span>
        <date>2018</date>
    </div>
    <div class="inside"></div>
</div>
<script>
    var tdtLayer = new ol.layer.Tile({
        source: new ol.source.XYZ({
            url: 'http://t0.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=4d7df7cf29ec7d2046c44c42f370887f'
        })
    })//底图
    // 创建地图
    var map = new ol.Map({
        target: 'map',
        layers: [
            tdtLayer
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([0, 0]),
            zoom: 3
        }),
        controls: ol.control.defaults.defaults().extend([
            new ol.control.FullScreen,
            new ol.control.ScaleLine,
        ]),
        interactions: ol.interaction.defaults.defaults({
            mouseWheelZoom: false, // 取消滚动鼠标中间的滑轮交互
            shiftDragZoom: false, // 取消shift+wheel左键拖动交互
        })
    });
    var countries_json = ['json_world/2014_countries.json','json_world/2015_countries.json','json_world/2017_countries.json','json_world/2018_countries.json']
    var country_layer = new ol.layer.Vector();
    var country_source = new ol.source.Vector();
</script>
<script>
    var blue = new ol.style.Style({
        image: new ol.style.Circle({
            radius:5
        }),
        fill:  new ol.style.Fill({
            color: 'rgba(123,129,160,0.4)',
        }),
        stroke: new ol.style.Stroke({
            color: '#2c3e50',
            width: 1,
        }),
    })
    var red = new ol.style.Style({
        image: new ol.style.Circle({
            radius:5
        }),
        fill:  new ol.style.Fill({
            color: 'rgba(219,164,158,0.4)',
        }),
        stroke: new ol.style.Stroke({
            color: '#e74c3c',
            width: 1,
        }),
    })
    var green = new ol.style.Style({
        image: new ol.style.Circle({
            radius:5
        }),
        fill:  new ol.style.Fill({
            color: 'rgba(145,173,121,0.4)',
        }),
        stroke: new ol.style.Stroke({
            color: '#7b3',
            width: 1,
        }),
    })
    var yellow = new ol.style.Style({
        image: new ol.style.Circle({
            radius:5
        }),
        fill:  new ol.style.Fill({
            color: 'rgba(225,216,138,0.4)',
        }),
        stroke: new ol.style.Stroke({
            color: '#e8c309',
            width: 1,
        }),
    })
    var color = [blue,red,green,yellow]
    var highlight = [red,green,yellow,blue]
    $('.dot:nth-child(1)').click(function(){
        map.removeLayer(country_layer)
        map.removeOverlay(popup)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[0], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setStyle(blue)
        country_layer.setSource(country_source)
        country_layer.setProperties({'index':0})
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '20%'
        }, 500);
    });
    $('.dot:nth-child(2)').click(function(){
        map.removeLayer(country_layer)
        map.removeOverlay(popup)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[1], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        country_layer.setStyle(red)
        country_layer.setProperties({'index':1})
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '40%'
        }, 500);
    });
    $('.dot:nth-child(3)').click(function(){
        map.removeLayer(country_layer)
        map.removeOverlay(popup)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[2], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        country_layer.setStyle(green)
        country_layer.setProperties({'index':2})
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '60%'
        }, 500);
    });
    $('.dot:nth-child(4)').click(function(){
        map.removeLayer(country_layer)
        map.removeOverlay(popup)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[3], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        country_layer.setStyle(yellow)
        country_layer.setProperties({'index':3})
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '80%'
        }, 500);
    });
</script>
<script>
    var $div_popup;
    function createPopupDiv(){
        $div_popup=$("<div id='popup' class='popUp'>");
        $("body").append($div_popup);
    }
    createPopupDiv();
    // 创建一个overlay层
    var popup = new ol.Overlay({
        element: document.getElementById('popup'),
        autoPan:true,
        autoPanMargin:100,
        positioning:'center-left',
        offset:[10,-5]
    });
    function active_select(e){
        var pixel=map.getEventPixel(e.originalEvent);
        var countries = country_source.getFeatures()
        var index = country_layer.getProperties()['index']
        for(var i = 0;i<countries.length;i++){
            countries[i].setStyle(color[index])
        }
        var feature=map.forEachFeatureAtPixel(pixel,function (feature,layer) {
            if(feature){
                feature.setStyle(highlight[index])
                return feature
            }
            return feature
        })
        if(feature===undefined){
            map.getTargetElement().style.cursor="default"
        }else{
            map.getTargetElement().style.cursor="pointer"
        }
    }
    function country_selected(db_f){
        var index = country_layer.getProperties()['index']
        db_f.setStyle(highlight[index]);
        var property=db_f.getProperties();
        var center = ol.extent.getCenter(db_f.getGeometry().getExtent())
        var element = popup.getElement();
        var hdms = "点名:"+property['name']+"</br>";

        element.innerHTML=hdms;
        map.addOverlay(popup);
        popup.setPosition(center);
        map.getView().animate({
            center: center
        })
    }
    map.on('click', function(evt) {
        map.removeOverlay(popup);
        var index = country_layer.getProperties()['index']
        var countries = country_source.getFeatures()
        for(var i = 0;i<countries.length;i++){
            countries[i].setStyle(color[index])
        }
        // 使用forEachFeatureAtPixel来遍历点击位置的所有图层和特征
        map.forEachFeatureAtPixel(evt.pixel, function(feature, layer) {
            country_selected(feature);
        });
    });
    map.on("pointermove", active_select);
</script>
</body>
</html>
