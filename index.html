<!DOCTYPE html>
<html lang="en">
<head>
    <title>Earthquakes heatmap</title>
    <script src="https://libs.baidu.com/jquery/1.11.3/jquery.min.js"></script>
    <link rel="js/ol.css" type="text/css">
    <link rel="stylesheet" href="https://lib.baomitu.com/ol3/4.6.5/ol.css">
    <script src="https://lib.baomitu.com/ol3/4.6.5/ol.js"></script>
    <script src="https://libs.baidu.com/jquery/1.11.3/jquery.min.js"></script>
    <link rel="stylesheet" href="teststyle.css">

    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode:'c37825bd281e3d960bbdada555c86394',
        }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=1.4.15&key=44ffcba6aed5ef531d05633efd6f2e38"></script>
   

</head>
<body>
<div class="container-fluid">

    <div class="row-fluid">
        <div class="span12">
            <div id="map" class="map"></div>
        </div>
        <div class="span4">
            <form>
                <label>radius size</label>
                <input id="radius" type="range" min="1" max="50" step="1" value="5"/>
                <label>blur size</label>
                <input id="blur" type="range" min="1" max="50" step="1" value="15"/>
            </form>
        </div>
    </div>

</div>

<script>



/////////////////////////////////////////////////////////////////////////////////////////////////////////
    var data = {
        "周黑鸭(武汉洪山区东澜岸广场店)": {"type":"Point","coordinates":[114.257904,30.435078]},
        "蓉城老麻(洪山区总店)": {"type":"Point","coordinates":[114.25958,30.435429]},
        "吴老三(武汉洪山区)": {"type":"Point","coordinates":[114.332344,30.486164]},
        "武汉市洪山区潇湘城副食店": {"type":"Point","coordinates":[114.26129,30.433481]},
        "芝士焗饭(武汉洪山区)": {"type":"Point","coordinates":[114.34552,30.477995]},
        "幸福菜肴(武汉洪山区)": {"type":"Point","coordinates":[114.378624,30.442793]},
        "武汉市洪山区新春来酒家": {"type":"Point","coordinates":[114.2448,30.46085]},
        "周黑鸭(武汉洪山区白沙五路湘龙鑫城店)": {"type":"Point","coordinates":[114.261986,30.48028]},
        "武汉洪山区满香庭川菜馆": {"type":"Point","coordinates":[114.27121,30.479614]},
        "周黑鸭(武汉洪山区未来城店)": {"type":"Point","coordinates":[114.27213,30.482204]},
        "九多肉多(武汉市洪山区南国都市店)": {"type":"Point","coordinates":[114.27725,30.482265]},
        "周黑鸭(武汉市洪山区万科金色城市店)": {"type":"Point","coordinates":[114.25551,30.486017]},
        "武汉市洪山区法芙纳烘焙坊": {"type":"Point","coordinates":[114.282364,30.48332]},
        "周黑鸭(武汉洪山区武昌工学院店)": {"type":"Point","coordinates":[114.27568,30.48998]},
        "周黑鸭(武汉洪山区彩虹郡店)": {"type":"Point","coordinates":[114.290306,30.459227]},
        "周黑鸭(武汉市洪山区白沙洲东原启城店)": {"type":"Point","coordinates":[114.28601,30.470375]},
        "周黑鸭(武汉洪山区清江锦城店)": {"type":"Point","coordinates":[114.29054,30.477179]},
        "小四川平价名厨(武汉洪山区)": {"type":"Point","coordinates":[114.30458,30.472633]},
        "周黑鸭(武汉洪山区板桥新村特店)": {"type":"Point","coordinates":[114.3047,30.472185]},
        "周黑鸭(武汉洪山区波光霞影店)": {"type":"Point","coordinates":[114.287254,30.486238]},
        "周黑鸭(武汉洪山区保利上城店)": {"type":"Point","coordinates":[114.28524,30.498442]}
    };

    var heatData7 = {
        type: "FeatureCollection",
        features: []
    };

    for (var key in data) {
        if (data.hasOwnProperty(key)) {
            heatData7.features.push({
                "type": "Feature",
                "properties": {},
                "geometry": {
                    type: "Point",
                    coordinates: [data[key].coordinates[0], data[key].coordinates[1]] // Coordinates remain the same
                }
            });
        }
    }

    console.log(heatData7);



    function getTdtLayer(title, type, opacity) {
        var url = 'http://t0.tianditu.com/DataServer?T=' + type + '&X={x}&Y={y}&L={z}&tk=23796fd920dd90cd47033db3f5862a7a';
        var proj = ol.proj.get('EPSG:4326');
        var layer = new ol.layer.Tile({
            title: title,
            source: new ol.source.XYZ({
                url: url,
                projection: proj
            }),
            opacity: opacity
        });
        return layer;
    }

    // 天地图矢量地图
    var vec_c = getTdtLayer("天地图矢量图层", "vec_c", 1);
    var cva_c = getTdtLayer("天地图矢量注记图层", "cva_c", 1);

    var source = new ol.source.Vector({});
    var vectorLayer = new ol.layer.Vector({
        source: source
    });

    const map = new ol.Map({
        target: "map",
        layers: [vec_c, cva_c, vectorLayer], // Add vectorLayer here
        view: new ol.View({
            center: ol.proj.fromLonLat([114.389364766, 30.59664027]), // 使用 EPSG:3857
            zoom: 15
        })
    });


    var blur = document.getElementById('blur');
    var radius = document.getElementById('radius');
    blur.addEventListener('input', function() {
        vector.setBlur(parseInt(blur.value, 5));
    });

    radius.addEventListener('input', function() {
        vector.setRadius(parseInt(radius.value, 10));
    });


    //矢量图层 获取gejson数据
    var vectorSource = new ol.source.Vector({
        features: (new ol.format.GeoJSON()).readFeatures(heatData7,{
            dataProjection : 'EPSG:4326',
            featureProjection : 'EPSG:3857'
        })
    });
    // Heatmap热力图
    var vector = new ol.layer.Heatmap({
        source: vectorSource,
        blur: parseInt(blur.value, 10),
        radius: parseInt(radius.value, 10),
    });

    map.addLayer(vector);
</script>

</body>
</html>
