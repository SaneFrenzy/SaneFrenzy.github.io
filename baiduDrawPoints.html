<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>MapVGL</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map_container {
            width: 100%;
            height: 100%;
            margin: 0;
        }
    </style>

    <script src="//api.map.baidu.com/api?v=1.0&type=webgl&ak=DLWm40m6Ko1nVJ9Es3qQRwn8zorGK0si"></script>
    <script src="https://mapv.baidu.com/gl/examples/static/common.js"></script>
    <script src="//mapv.baidu.com/build/mapv.min.js"></script>
    <script src="https://code.bdstatic.com/npm/mapvgl@1.0.0-beta.189/dist/mapvgl.min.js"></script>

</head>
<body>
<div id="map_container"></div>
<script>


    var map = initMap({
        tilt: 49.6,
        heading: 0,
        center: [70.,38],
        zoom: 5,
        style: whiteStyle,
        skyColors: [
            // 地面颜色
            'rgba(226, 237, 248, 0)',
            // 天空颜色
            'rgba(186, 211, 252, 1)'
        ]
    });

    var view = new mapvgl.View({
        map: map
    });

    var intensity = new mapvgl.Intensity({
        max: 100,
        min: 0,
        gradient: {
            0: 'rgb(25, 66, 102, 0.8)',
            0.3: 'rgb(145, 102, 129, 0.8)',
            0.7: 'rgb(210, 131, 137, 0.8)',
            1: 'rgb(248, 177, 149, 0.8)'

        },
        maxSize: 30,
        minSize: 5
    });

    var data=[];

    fetch('丝路沿线地区_FeaturesToJSON.json')
        .then((response) => response.json())
        .then((json) => {
            // 假设json是一个对象数组，每个对象都有geometry和properties属性
            data = json.features; // 将加载的数据的features属性赋值给data变量
            console.log('data1', data);

            // 创建点图层
          var pointLayer = new mapvgl.RippleLayer({
                // blend: 'lighter',
                data: data, 
                size: 50 ,
                color: 'rgba(25, 25, 250, 1)' ,
                duration:1
            });

            view.addLayer(pointLayer);
            // pointLayer.setData(data); // 这一行不再是必需的，因为我们在创建点图层时已经提供了数据
        })
        .catch((error) => {
            console.error('Error loading JSON:', error);
        });

</script>
</body>
</html>
