<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="http://libs.baidu.com/jquery/2.1.4/jquery.min.js"></script>
    <link rel="stylesheet" href="ol/ol.css">
    <script src="ol/dist/ol.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100vh;
        }
    </style>
    <style>
        body {
            font-family: arial, sans-serif;
            margin:0;
        }

        .checkcaption {
            text-align: center;
            margin-top: 10px;
        }

        .check {
            width: 60px;
            height: 30px;
            border: #222 solid 2px;
            position: relative;
            margin: 10px auto;
            border-radius: 15px;
        }

        .check input {
            visibility: hidden;
            height: 30px;
            width: 60px;
        }

        .check label {
            display: block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #e74c3c;
            cursor: pointer;
            position: absolute;
            top: 18%;
            left: 12%;
            transition: all 0.3s ease;
        }

        .check input:checked + label {
            left: 55%;
            background-color: #7b3;
        }

        div#timeline {
            background-color: #5ca8db;
            margin-bottom: 150px;
            height: 10px;
            width: 100%;
            position: fixed;
            z-index: 999;
            bottom: 0;
        }

        div#timeline .inside {
            position: absolute;
            height: 4px;
            background-color: #fff;
            width: 0%;
            top: 3px;
            left: 0;
        }

        div#timeline .dot {
            z-index: 99;
            transition: 0.3s ease-in-out;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            top: -15px;
            text-align: center;
        }

        div#timeline .dot:nth-child(1) {
            left: 20%;
            background-color: #2c3e50;
        }

        div#timeline .dot:nth-child(2) {
            left: 40%;
            background-color: #e74c3c;
        }

        div#timeline .dot:nth-child(3) {
            left: 60%;
            background-color: #7b3;
        }

        div#timeline .dot:nth-child(4) {
            left: 80%;
            background-color: #204f7c;
        }

        div#timeline .dot:hover {
            transform: scale(1.2);
        }

        div#timeline .dot date {
            font-family: roboto;
            font-size: 1.1rem;
            display: block;
            position: relative;
            top: -60px;
            text-align: center;
        }

        div#timeline .dot span {
            display: inline-block;
            margin-top: 10px;
            width: 20px;
            height: 20px;
            background-color: #fff;
            position: relative;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        article {
            display: none;
            position: relative;
            top: 30px;
            max-width: 960px;
            background-color: #fff;
            padding: 20px;
            margin: auto;
        }

        article date {
            display: block;
            text-align: right;
        }

        article h2 {
            font-family: merriweather, sans-serif;
            font-size: 5rem;
            padding: 10px 0;
            border-bottom: solid #111 2px;
            margin-bottom: 20px;
        }

        article p {
            line-height: 130%;
        }

        div.mask {
            display: none;
            left: 0;
            top: 0;
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 99999;
        }

        div.mask.active {
            display: block;
        }

        div.mask article {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            margin-top: 50px;
            max-width: 960px;
            background-color: #fff;
            padding: 20px;
            margin: auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
        }

        div.mask article date {
            display: block;
            text-align: right;
        }

        div.mask article h2 {
            font-family: merriweather, sans-serif;
            font-size: 5rem;
            padding: 10px 0;
            border-bottom: solid #111 2px;
            margin-bottom: 20px;
        }

        div.mask article p {
            line-height: 130%;
        }
    </style>
</head>
<body>
<!--<p class="checkcaption">no modal boxes?</p>-->
<!--<div class="check">-->
<!--    <input type="checkbox" id="switch1" name="switch1" class="switch" />-->
<!--    <label for="switch1"></label>-->
<!--</div>-->
<div id="map"></div>
<div id="timeline">
    <div class="dot" id="one">
        <span></span>
        <date>2014</date>
    </div>
    <div class="dot" id="two">
        <span></span>
        <date>2015</date>
    </div>
    <div class="dot" id="three">
        <span></span>
        <date>2017</date>
    </div>
    <div class="dot" id="four">
        <span></span>
        <date>2018</date>
    </div>
    <div class="inside"></div>
</div>
<script>
    var tdtLayer = new ol.layer.Tile({
        source: new ol.source.XYZ({
            url: 'http://t0.tianditu.gov.cn/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=4d7df7cf29ec7d2046c44c42f370887f'
        })
    })//底图
    // 创建地图
    var map = new ol.Map({
        target: 'map',
        layers: [
            tdtLayer
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([0, 0]),
            zoom: 3
        }),
        controls: ol.control.defaults.defaults().extend([
            new ol.control.FullScreen,
            new ol.control.ScaleLine,
        ])
    });
    var countries_json = ['json_world/2014_countries.json','json_world/2015_countries.json','json_world/2017_countries.json','json_world/2018_countries.json']
    var country_layer = new ol.layer.Vector();
    var country_source = new ol.source.Vector();
</script>
<script>
    $('.dot:nth-child(1)').click(function(){
        map.removeLayer(country_layer)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[0], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '20%'
        }, 500);
    });
    $('.dot:nth-child(2)').click(function(){
        map.removeLayer(country_layer)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[1], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '40%'
        }, 500);
    });
    $('.dot:nth-child(3)').click(function(){
        map.removeLayer(country_layer)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[2], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '60%'
        }, 500);
    });
    $('.dot:nth-child(4)').click(function(){
        map.removeLayer(country_layer)
        country_source.refresh()
        country_source = new ol.source.Vector({
            url: countries_json[3], // Specify the path to your GeoJSON file
            format: new ol.format.GeoJSON() // Specify the format of the GeoJSON
        })
        country_layer.setSource(country_source)
        map.addLayer(country_layer)
        $('.inside').animate({
            'width' : '80%'
        }, 500);
    });
</script>
</body>
</html>
